<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOMNAO STORE Payment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            min-height: 100vh;
        }
        /* คงส่วน Keyframes เดิมไว้ */
        @keyframes float-up-down { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(10deg); } }
        @keyframes float-left-right { 0%, 100% { transform: translateX(0px) rotate(0deg); } 50% { transform: translateX(15px) rotate(-10deg); } }
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        @keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
        .animate-dash { animation: dash-animation 1s linear infinite; }
        .anim-float-1 { animation: float-up-down 4s ease-in-out infinite; }
        .anim-float-2 { animation: float-up-down 5s ease-in-out infinite 1.5s; }
        .anim-float-3 { animation: float-left-right 6s ease-in-out infinite; }
        .anim-float-4 { animation: float-left-right 4.5s ease-in-out infinite 2s; }
        .anim-pulse { animation: pulse-soft 3s ease-in-out infinite; }
        .anim-spin { animation: spin-slow 8s linear infinite; }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -10px rgba(244, 114, 182, 0.2);
        }
        .virtual-card { transition: all 0.3s ease; }
        .virtual-card:hover { transform: translateY(-4px); }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff0f5',
                            100: '#ffe0eb',
                            500: '#ec4899', // ชมพูหลัก
                            600: '#db2777',
                        }
                    }
                }
            }
        }

        function copyText(text, btn, type) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-4'); }, 2000);
        }
    </script>
</head>
<body class="flex flex-col items-center py-6 px-4 text-pink-900">

    <div class="rounded-[28px] overflow-hidden relative shadow-sm border-[4px] border-white">
        <img src="1138_20260624085427.png" alt="บัญชี LOMNAO STORE" class="w-full h-auto object-cover" onerror="this.src='https://placehold.co/600x600/fce7f3/ec4899?text=LOMNAO+STORE'">
    </div>

    <h1 class="text-2xl font-bold text-pink-600">LOMNAO STORE</h1>
    
    <div class="virtual-card bg-gradient-to-br from-pink-400 to-pink-500 rounded-[24px] p-5 text-white cursor-pointer" onclick="copyText('165-374-8740', this)">
        <div class="text-sm font-bold">KBank (กสิกรไทย)</div>
        <div class="text-[22px] font-bold tracking-widest">165-374-8740</div>
    </div>

    <div id="toast" class="fixed bottom-8 bg-pink-600 text-white px-6 py-3 rounded-full shadow-xl transition-all opacity-0">
        คัดลอกเลขบัญชีแล้ว
    </div>

</body>
</html>
